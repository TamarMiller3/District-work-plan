<!DOCTYPE html>

<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f8f9fa;color:#1a1a1a;padding:16px 12px;direction:rtl}
#app{max-width:1000px;margin:0 auto;display:flex;flex-direction:row-reverse;gap:0;align-items:flex-start}

.tab.on{color:#fff;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-color:#1d4ed8;font-weight:700;box-shadow:0 4px 12px rgba(59,130,246,0.4);transform:translateX(-2px)}
.shdr{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e5e7eb}
.stitle{font-size:16px;font-weight:600}
.sdesc{font-size:13px;color:#666;margin-top:4px}

.cc{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:10px}
.cc.cl{border-color:#d1d5db;background:#f9fafb}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.ctitle{font-size:14px;font-weight:600}
.cbadge{font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0}
.cdesc{font-size:12.5px;color:#555;margin-bottom:10px;line-height:1.55}

.rb.sna{background:#f3f4f6;border-color:#9ca3af;color:#374151;font-weight:600}

.btn-export{padding:8px 10px;font-size:13px;border:1.5px solid #3b82f6;border-radius:8px;cursor:pointer;background:#eff6ff;color:#1d4ed8;font-family:Arial,sans-serif;font-weight:600;display:block;width:100%;text-align:center}
.btn-export:hover{background:#dbeafe}
.btn-import{padding:8px 10px;font-size:13px;border:1.5px solid #d1d5db;border-radius:8px;cursor:pointer;background:#f9fafb;color:#374151;font-family:Arial,sans-serif;font-weight:600;display:block;width:100%;text-align:center}
.btn-import:hover{background:#f3f4f6}
#import-file{display:none}
.lhint{font-size:12px;color:#555;margin-bottom:8px;padding:6px 10px;background:#f9fafb;border-radius:6px;border-right:3px solid #d1d5db;min-height:32px;line-height:1.5}
.nlbl{font-size:11.5px;color:#888;margin-bottom:3px}
.narea{width:100%;padding:7px 10px;font-size:12.5px;border:1px solid #e5e7eb;border-radius:6px;font-family:Arial,sans-serif;color:#111;background:#f9fafb;resize:vertical;min-height:52px;direction:rtl}

.sumtop{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.sumc{background:#fff;border-radius:8px;padding:12px;text-align:center;border:1px solid #e5e7eb}
.sumsn{font-size:11px;color:#888;margin-bottom:6px;line-height:1.4}
.sumpct{font-size:22px;font-weight:600}
.sumbar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:8px;overflow:hidden}
.sumbf{height:100%;border-radius:2px;transition:width 0.4s}
.sumlbl{font-size:11px;color:#888;margin-top:4px}
.ovbox{background:#fff;border-radius:10px;padding:16px;margin-bottom:20px;border:1px solid #e5e7eb}
.ovtitle{font-size:14px;font-weight:600;margin-bottom:10px}
.ovbar{height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;margin-bottom:6px}
.ovfill{height:100%;border-radius:5px;transition:width 0.4s}
.ovcap{font-size:12px;color:#888}
.dets{border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:10px}
.detsn{font-size:13px;font-weight:600;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.drow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dn{font-size:12px;color:#888;flex:2;min-width:0}
.db{flex:1;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.dbf{height:100%;border-radius:3px}
.dba{font-size:11px;padding:1px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.btnrow{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid #e5e7eb;margin-top:16px}
.btng{padding:7px 14px;font-size:13px;border:1px solid #d1d5db;border-radius:6px;cursor:pointer;background:#fff;color:#111;font-family:Arial,sans-serif}
.btng:hover{background:#f3f4f6}
</style>

<body>
<div id="app">
  <div id="main" style="flex:1;min-width:0;">
  <h2 class="app-title">מחוון מעקב — ביצוע תכנית עבודה אגפית</h2>
  <p class="app-sub">כלי לבדיקה עצמית לאורך כל שלבי תכנית העבודה, משלב התכנון ועד הערכת התוצאות</p>
  <div class="meta-row">
    <div class="mf"><label>אגף</label><select id="md"><option value="">— בחר/י אגף —</option><option>קדם יסודי</option><option>יסודי</option><option>על יסודי</option><option>חמד</option><option>חינוך מיוחד</option><option>שפ"י</option><option>ילדים ונוער בסיכון</option><option>חברה ערבית</option><option>תוכנית 360</option><option>יחידה של הפיתוח המקצועי</option><option>מינהל חברה ונוער</option></select></div>

    <div class="mf"><label>שנת לימודים</label><select id="my"><option>תשפ"ו</option><option>תשפ"ז</option><option>תשפ"ח</option><option>תשפ"ט</option><option>תש"צ</option></select></div>

  </div>
  <div id="sc"></div>
  </div><!-- /main -->
  <div class="nav" id="nav"></div>
</div>
<script>
const F=['#ef4444','#f97316','#eab308','#22c55e'];
const BG=['#fee2e2','#ffedd5','#fef9c3','#dcfce7','#14532d'];
const TX=['#991b1b','#9a3412','#854d0e','#166534','#ffffff'];
function i2(v){return[0,2,3][v];}
function fc(p){return p<25?F[0]:p<50?F[1]:p<75?F[2]:F[3];}
function fb(p){return p<25?BG[0]:p<50?BG[1]:p<75?BG[2]:BG[3];}
function ft(p){return p<25?TX[0]:p<50?TX[1]:p<75?TX[2]:TX[3];}
function fl(p){if(p===null)return'לא הוזן';return p<25?'לא בוצע':p<50?'בתחילת הדרך':p<75?'בתהליך':'בוצע';}
const CLI=['אוכלוסיית יעד — עובדי הוראה','אוכלוסיית יעד — לומדים','משאבי תקציב: שעות תקן, תקציב גפ"ן, שעות תקציב'];
const LB2A=['כלל לא','במידה חלקית','באופן מלא'];
const LB2B=['טרם בוצע','בוצע באופן חלקי','בוצע באופן מלא'];
const LB4=['לא בוצע','בתחילת הדרך','בתהליך','בוצע','מצוין'];
const ST=[
  {id:'a',tab:'א. תכנון',sc:2,lb:LB2A,sn:'סרגל: 0–2',title:'שלב א׳ — איכות תכנית העבודה',desc:'האם התכנית מנוסחת בצורה ברורה, מדידה ומקצועית?',cr:[
    {id:'p0',tp:'cl',title:'בסיס נתונים',desc:'תכנית העבודה האגפית מבוססת על מאגר נתונים עדכני. סמן/י את מקורות הנתונים הקיימים בתכנית:'},
    {id:'p1',title:'משימות מרכזיות ברורות ומקושרות ליעדים',desc:'המשימות המרכזיות מוגדרות, ממוקדות, ומקושרות ישירות לאחת המטרות/יעדים האגפיים',lv:['המשימות אינן מוגדרות בבהירות ואינן מקושרות ליעדים','חלק מהמשימות מוגדרות ומקושרות ליעדים, אך לא כולן','כל המשימות מוגדרות בבהירות, ממוקדות ומקושרות ליעדים האגפיים']},
    {id:'p2',title:'תתי-משימות ופעולות מפורטות',desc:'כל משימה מרכזית מחולקת לפעולות קונקרטיות וברות-ביצוע',lv:['תתי-משימות אינן מפורטות או חסרות לחלוטין','חלק מהמשימות מפורטות לפעולות קונקרטיות, אך לא כולן','כל המשימות מפורטות לפעולות קונקרטיות וברות-ביצוע']},
    {id:'p3',title:'מדדי תוצאה מדידים',desc:'מדד התוצאה מבטא שינוי נמדד ולא תיאור פעולה — מה ישתנה, לא מה ייעשה',lv:['אין מדדי תוצאה מדידים, או שהמדדים מתארים פעולות בלבד','חלק מהמדדים מדידים וכמותיים, חלקם עדיין כלליים','כל מדדי התוצאה מדידים, כמותיים ובעלי בסיס השוואה']},
    {id:'p4',title:'מדדי תפוקה ברורים לכל משימה',desc:'מדדי תפוקה מוגדרים כאינדיקטורים כמותיים המודדים את התוצרים הישירים של פעילות, משימה או תהליך המשקפים את ליבת העשייה',lv:['אין מדדי תפוקה כמותיים, או שאינם קשורים לתוצרים הישירים של המשימה','חלק מהמשימות כוללות מדדי תפוקה כמותיים הניתנים לאימות','כל משימה כוללת מדדי תפוקה כמותיים ברורים המשקפים את ליבת העשייה']},
    {id:'p5',title:'חלוקת אחריות לפי שמות',desc:'לכל משימה הוגדר אחראי ספציפי בשם — לא "האגף" או "הצוות"',lv:['אין הגדרת אחריות, או שמוטלת על "האגף" ללא שם','חלק מהמשימות כוללות שם אחראי ספציפי, אחרות לא','כל משימה כוללת שם אחראי ספציפי']},
    {id:'p6',title:'לוח זמנים ריאלי ומלא',desc:'תאריכי התחלה וסיום קיימים לכל משימה ומשקפים ריאליות ביצועית',lv:['תאריכים חסרים לחלוטין, או קיימים לפחות מחצי המשימות','תאריכים קיימים לרוב המשימות, אך חלקם חלקיים או אינם ריאליים','תאריכים מלאים וריאליים לכל המשימות, מתואמים ביניהן']}
  ]},
  {id:'b',tab:'ב. היערכות',sc:2,lb:LB2B,sn:'סרגל: 0–2 (טרם בוצע / חלקי / מלא)',title:'שלב ב׳ — היערכות לביצוע',desc:'מידת המוכנות לביצוע בשטח',cr:[
    {id:'rp1',title:'הקצאת משאבים מוגדרת',desc:'כוח אדם, תקציב, זמן וכלים הוקצו לכל משימה לפני הפתיחה',lv:['טרם הוקצו משאבים לביצוע','הוקצו משאבים לחלק מהמשימות בלבד','הוקצו משאבים לכלל המשימות באופן מלא']},
    {id:'rp2',title:'יידוע הגורמים השותפים לביצוע התוכנית',desc:'כל הגורמים השותפים לביצוע מכירים את התוכנית ואת חלקם בה',lv:['הגורמים השותפים טרם יודעו על התוכנית','חלק מהגורמים השותפים יודעו על תפקידם','כל הגורמים השותפים יודעו ומכירים את תפקידם בתוכנית']},
    {id:'rp4',title:'צמתי בקרה, הערכה ועדכון',desc:'מועדי ביניים לבדיקת התקדמות הוגדרו ורשומים בלוח הגאנט',lv:['צמתי בקרה טרם הוגדרו','הוגדר צומת בקרה אחד בלבד','מספר צמתי בקרה הוגדרו ורשומים בלוח הגאנט']}
  ]},
  {id:'c',tab:'ג. ביצוע',sc:4,lb:LB4,sn:null,title:'שלב ג׳ — ביצוע ויישום',desc:'האם הביצוע מתנהל כמתוכנן בשטח?',cr:[
    {id:'im1',title:'עמידה בלוח הזמנים',desc:'הפעולות מתבצעות בהתאם לתאריכים שנקבעו בתכנית',lv:['רוב הפעולות מאחרות משמעותית','איחורים ניכרים בחלק מהמשימות','עמידה חלקית, עם עיכובים סבירים','כמעט כל הפעולות מתבצעות בזמן','עמידה מלאה בלוח הזמנים']},
    {id:'im2',title:'יישום תתי-המשימות כמתוכנן',desc:'הפעולות שתוכננו מיושמות בשטח כפי שהוגדרו בתכנית',lv:['הפעולות לא מיושמות בשטח','פעולות בודדות מיושמות (פחות מ-25%)','יישום חלקי (כ-50% מהפעולות)','רוב הפעולות מיושמות כמתוכנן (75%+)','כל הפעולות מיושמות']},
    {id:'im3',title:'שיתוף פעולה עם גורמי ממשק',desc:'גורמים פנימיים וחיצוניים מעורבים ופועלים יחד בצורה יעילה',lv:['אין שיתוף פעולה','שיתוף פעולה מינימלי ומזדמן','שיתוף פעולה חלקי','שיתוף פעולה סדיר עם כל הגורמים','שיתוף פעולה פורה עם יזמות']},
    {id:'im4',title:'תיעוד ורישום שוטף',desc:'הביצוע מתועד שוטפות — פגישות, ממצאים, החלטות',lv:['אין תיעוד של ממש','תיעוד חלקי ולא שיטתי','תיעוד קיים אך לא מעודכן','תיעוד שוטף ומסודר','תיעוד מלא, נגיש, ומשמש לקבלת החלטות']}
  ]},
  {id:'d',tab:'ד. ניטור',sc:4,lb:LB4,sn:null,title:'שלב ד׳ — ניטור ומעקב',desc:'האם אנחנו שולטים על ההתקדמות ומגיבים בזמן?',cr:[
    {id:'mo1',title:'עדכון סטטוס ביצוע',desc:'עמודת "סטטוס ביצוע" בתכנית מעודכנת באופן שוטף',lv:['הסטטוס לא עודכן מאז ההתחלה','עדכון בתחילה ובסוף בלבד','עדכון פעם בחודש','עדכון שוטף — כל שבועיים לפחות','עדכון בזמן אמת']},

function importData(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!d.version||!d.version.startsWith('wpr')){
        alert('קובץ לא תקין — ודאי שזהו קובץ גיבוי של המחוון');
        return;
      }
      if(!confirm('טעינת הגיבוי תחליף את הנתונים הקיימים. להמשיך?'))return;
      Z.r=d.ratings||{};
      Z.n=d.notes||{};
      Z.k=d.checks||{};
      sv();
      if(d.meta){
        const fd=document.getElementById('md');
        const fz=document.getElementById('mz');
        const fy=document.getElementById('my');
        const fdt=document.getElementById('mdt');
        if(fd&&d.meta.dept){[...fd.options].forEach(o=>{if(o.value===d.meta.dept||o.text===d.meta.dept)o.selected=true;});}
        if(fz&&d.meta.district)fz.value=d.meta.district;
        if(fy&&d.meta.year){[...fy.options].forEach(o=>{if(o.value===d.meta.year||o.text===d.meta.year)o.selected=true;});}
        if(fdt&&d.meta.date)fdt.value=d.meta.date;
        ['md','mz','my','mdt'].forEach(id=>sm(id));
      }
      ren();
      alert('הנתונים נטענו בהצלחה!');
    }catch(err){
      alert('שגיאה בטעינת הקובץ: '+err.message);
    }
    event.target.value='';
  };
  reader.readAsText(file);
}

[['md'],['mz'],['my'],['mdt']].forEach(([id])=>{const el=document.getElementById(id);if(el)el.addEventListener('change',()=>sm(id));});
ld();ren();
</script>
</body>
</html>
